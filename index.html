<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Vídeos com Narração</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #22c55e;
            color: white;
        }
        
        .btn-success:hover {
            background: #16a34a;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            display: none;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .image-card {
            background: #f9f9f9;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .image-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .image-card p {
            padding: 15px;
            color: #666;
            font-size: 14px;
        }
        
        .video-player {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
            display: none;
        }
        
        .video-player canvas {
            width: 100%;
            display: block;
        }
        
        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s;
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 14px;
        }
        
        .narration-box {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .narration-box h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .history-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .history-item:hover {
            background: #e0e0e0;
        }
        
        .source-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .source-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .source-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎬 Criador de Vídeos com Narração</h1>
            <p>Transforme suas ideias em vídeos de 15 segundos com narração</p>
        </header>

        <div class="card">
            <label>📝 Digite seu roteiro ou tema:</label>
            <textarea id="scriptInput" placeholder="Ex: Uma aventura nas montanhas com paisagens bonitas, neve e céu azul..."></textarea>
            
            <label style="margin-top: 20px;">🖼️ Fonte das Imagens:</label>
            <div class="source-selector">
                <button class="source-btn active" data-source="generated">🎨 IA</button>
                <button class="source-btn" data-source="pexels">📷 Pexels</button>
                <button class="source-btn" data-source="unsplash">📸 Unsplash</button>
                <button class="source-btn" data-source="pixabay">🖼️ Pixabay</button>
            </div>
            
            <div class="settings-grid">
                <div>
                    <label>⏱️ Duração:</label>
                    <select id="duration">
                        <option value="15">15 segundos</option>
                        <option value="30">30 segundos</option>
                        <option value="60">60 segundos</option>
                    </select>
                </div>
                <div>
                    <label>🎙️ Voz:</label>
                    <select id="voice">
                        <option value="pt-BR">Português</option>
                        <option value="en-US">Inglês</option>
                        <option value="es-ES">Espanhol</option>
                    </select>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" id="generateBtn">🎬 Gerar Vídeo</button>
                <button class="btn btn-success" id="playBtn" disabled>▶️ Reproduzir</button>
                <button class="btn btn-danger" id="stopBtn" disabled>⏹️ Parar</button>
                <button class="btn btn-primary" id="downloadBtn" disabled>⬇️ Baixar</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Gerando vídeo...</p>
            </div>
            
            <div class="video-player" id="videoPlayer">
                <canvas id="videoCanvas" width="1280" height="720"></canvas>
                <div style="padding: 15px;">
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:15</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress"></div>
                    </div>
                </div>
            </div>
            
            <div class="narration-box" id="narrationBox">
                <h3>📜 Narração:</h3>
                <p id="narrationText"></p>
            </div>
            
            <div class="images-grid" id="imagesGrid"></div>
        </div>
        
        <div class="card">
            <h2>📚 Histórico</h2>
            <div id="historyList">
                <p style="color: #666; text-align: center; padding: 20px;">Nenhuma criação ainda</p>
            </div>
            <button class="btn btn-danger" id="clearHistory" style="margin-top: 15px;">🗑️ Limpar</button>
        </div>
        
        <footer style="text-align: center; color: white; margin-top: 30px; opacity: 0.8;">
            <p>© 2024 - Imagens de Pexels, Unsplash, Pixabay e IA</p>
        </footer>
    </div>

    <script>
        let images = [];
        let isPlaying = false;
        let frame = 0;
        let totalFrames = 450;
        let animation = null;
        let speech = null;
        let recorder = null;
        let chunks = [];
        let source = 'generated';

        const scriptInput = document.getElementById('scriptInput');
        const generateBtn = document.getElementById('generateBtn');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const loading = document.getElementById('loading');
        const videoPlayer = document.getElementById('videoPlayer');
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const progress = document.getElementById('progress');
        const currentTime = document.getElementById('currentTime');
        const totalTime = document.getElementById('totalTime');
        const narrationBox = document.getElementById('narrationBox');
        const narrationText = document.getElementById('narrationText');
        const imagesGrid = document.getElementById('imagesGrid');
        const historyList = document.getElementById('historyList');
        const durationSelect = document.getElementById('duration');

        const sampleImages = [
            'https://images.pexels.com/photos/1287145/pexels-photo-1287145.jpeg',
            'https://images.pexels.com/photos/167699/pexels-photo-167699.jpeg',
            'https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg'
        ];

        document.querySelectorAll('.source-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                source = btn.dataset.source;
            });
        });

        generateBtn.addEventListener('click', generateVideo);
        playBtn.addEventListener('click', togglePlay);
        stopBtn.addEventListener('click', stopVideo);
        downloadBtn.addEventListener('click', downloadVideo);
        document.getElementById('clearHistory').addEventListener('click', clearHistory);

        function generateVideo() {
            const script = scriptInput.value.trim();
            if (!script) {
                alert('Digite um roteiro!');
                return;
            }

            const duration = parseInt(durationSelect.value);
            totalFrames = duration * 30;
            
            loading.style.display = 'block';
            videoPlayer.style.display = 'none';
            imagesGrid.innerHTML = '';
            generateBtn.disabled = true;

            setTimeout(() => {
                images = sampleImages.map((url, i) => ({
                    url: url,
                    prompt: `Imagem ${i + 1}: ${script}`
                }));

                images.forEach((img, i) => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <img src="${img.url}" alt="Imagem ${i + 1}">
                        <p>${img.prompt}</p>
                    `;
                    imagesGrid.appendChild(card);
                });

                const narration = script.length > 150 ? script.substring(0, 150) + '...' : script;
                narrationText.textContent = narration;
                narrationBox.style.display = 'block';
                
                document.getElementById('totalTime').textContent = `0:${duration}`;
                videoPlayer.style.display = 'block';
                playBtn.disabled = false;
                downloadBtn.disabled = false;
                loading.style.display = 'none';
                generateBtn.disabled = false;

                drawFrame(0);
                saveHistory(script, images, duration);
            }, 1500);
        }

        function drawFrame(f) {
            const imgIndex = Math.min(Math.floor(f / (totalFrames / images.length)), images.length - 1);
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width - img.width * scale) / 2;
                const y = (canvas.height - img.height * scale) / 2;
                ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
            };
            img.src = images[imgIndex]?.url || sampleImages[0];

            const pct = (f / totalFrames) * 100;
            progress.style.width = pct + '%';
            
            const secs = Math.floor(f / 30);
            currentTime.textContent = `0:${secs.toString().padStart(2, '0')}`;
        }

        function togglePlay() {
            if (isPlaying) {
                cancelAnimationFrame(animation);
                isPlaying = false;
                playBtn.textContent = '▶️ Reproduzir';
                window.speechSynthesis.cancel();
            } else {
                isPlaying = true;
                playBtn.textContent = '⏸️ Pausar';
                stopBtn.disabled = false;
                frame = 0;
                animate();
                speak();
                record();
            }
        }

        function animate() {
            if (!isPlaying) return;
            drawFrame(frame);
            frame++;
            if (frame >= totalFrames) {
                stopVideo();
                return;
            }
            animation = requestAnimationFrame(animate);
        }

        function speak() {
            window.speechSynthesis.cancel();
            speech = new SpeechSynthesisUtterance(narrationText.textContent);
            speech.lang = document.getElementById('voice').value;
            window.speechSynthesis.speak(speech);
        }

        function stopVideo() {
            isPlaying = false;
            frame = 0;
            cancelAnimationFrame(animation);
            window.speechSynthesis.cancel();
            playBtn.textContent = '▶️ Reproduzir';
            stopBtn.disabled = true;
            if (recorder) recorder.stop();
            drawFrame(0);
        }

        function record() {
            chunks = [];
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
            recorder.start();
        }

        function downloadVideo() {
            if (!chunks.length) {
                alert('Reproduza o vídeo primeiro!');
                return;
            }
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'video_' + Date.now() + '.webm';
            a.click();
            URL.revokeObjectURL(url);
        }

        function saveHistory(script, imgs, duration) {
            let history = JSON.parse(localStorage.getItem('videoHistory') || '[]');
            history.unshift({ script, imgs, duration, time: new Date().toLocaleString() });
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('videoHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('videoHistory') || '[]');
            if (!history.length) {
                historyList.innerHTML = '<p style="color:#666;text-align:center;padding:20px;">Nenhuma criação</p>';
                return;
            }
            historyList.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <strong>${item.script.substring(0, 50)}...</strong>
                    <br><small>${item.duration}s - ${item.time}</small>
                `;
                div.onclick = () => {
                    scriptInput.value = item.script;
                    images = item.imgs;
                    durationSelect.value = item.duration;
                    totalFrames = item.duration * 30;
                    narrationText.textContent = item.script;
                    narrationBox.style.display = 'block';
                    videoPlayer.style.display = 'block';
                    document.getElementById('totalTime').textContent = `0:${item.duration}`;
                    playBtn.disabled = false;
                    downloadBtn.disabled = false;
                    imagesGrid.innerHTML = '';
                    item.imgs.forEach((img, i) => {
                        const card = document.createElement('div');
                        card.className = 'image-card';
                        card.innerHTML = `<img src="${img.url}"><p>${img.prompt}</p>`;
                        imagesGrid.appendChild(card);
                    });
                    drawFrame(0);
                };
                historyList.appendChild(div);
            });
        }

        function clearHistory() {
            if (confirm('Limpar histórico?')) {
                localStorage.removeItem('videoHistory');
                loadHistory();
            }
        }

        loadHistory();
    </script>
</body>
</html>
