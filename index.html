<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Roteiros Visuais</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .image-card {
            transition: all 0.3s ease;
        }
        
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .audio-wave {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
        }
        
        .audio-bar {
            width: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        
        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }
        
        .audio-bar:nth-child(2) { animation-delay: 0.1s; }
        .audio-bar:nth-child(3) { animation-delay: 0.2s; }
        .audio-bar:nth-child(4) { animation-delay: 0.3s; }
        .audio-bar:nth-child(5) { animation-delay: 0.4s; }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-5xl font-bold text-white mb-4">🎬 Criador de Roteiros Visuais</h1>
            <p class="text-xl text-white opacity-90">Transforme suas ideias em imagens e narração automática</p>
        </header>

        <!-- Main Content -->
        <div class="glass-effect rounded-3xl shadow-2xl p-8 mb-8 animate-fade-in">
            <!-- Input Section -->
            <div class="mb-8">
                <label class="block text-gray-700 font-semibold mb-3 text-lg">
                    📝 Digite seu roteiro ou ideia:
                </label>
                <textarea 
                    id="scriptInput" 
                    class="w-full h-40 p-4 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none transition-all text-gray-700 text-lg"
                    placeholder="Ex: Uma cena de amanhecer na praia com ondas suaves, gaivotas voando e um casal caminhando pela areia..."
                ></textarea>
            </div>

            <!-- Controls -->
            <div class="flex flex-wrap gap-4 mb-8">
                <button 
                    id="generateBtn"
                    class="btn-primary text-white font-semibold py-4 px-8 rounded-xl flex items-center gap-3"
                >
                    <span>🎨</span>
                    <span>Gerar Imagens</span>
                </button>
                
                <button 
                    id="narrateBtn"
                    class="bg-green-500 hover:bg-green-600 text-white font-semibold py-4 px-8 rounded-xl flex items-center gap-3 transition-all"
                >
                    <span>🔊</span>
                    <span>Ouvir Narração</span>
                </button>
                
                <button 
                    id="stopNarrateBtn"
                    class="bg-red-500 hover:bg-red-600 text-white font-semibold py-4 px-8 rounded-xl flex items-center gap-3 transition-all"
                >
                    <span>⏹️</span>
                    <span>Parar Narração</span>
                </button>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="hidden text-center py-8">
                <div class="loading-spinner mx-auto mb-4"></div>
                <p class="text-gray-600 text-lg">Gerando imagens... aguarde</p>
            </div>

            <!-- Images Grid -->
            <div id="imagesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Images will be inserted here -->
            </div>
        </div>

        <!-- Audio Visualization -->
        <div id="audioVisualization" class="glass-effect rounded-3xl shadow-2xl p-6 mb-8 hidden animate-fade-in">
            <h3 class="text-xl font-semibold text-gray-700 mb-4">🎵 Narração em Andamento</h3>
            <div class="audio-wave">
                <div class="audio-bar"></div>
                <div class="audio-bar"></div>
                <div class="audio-bar"></div>
                <div class="audio-bar"></div>
                <div class="audio-bar"></div>
            </div>
        </div>

        <!-- History Section -->
        <div class="glass-effect rounded-3xl shadow-2xl p-8 animate-fade-in">
            <h2 class="text-2xl font-bold text-gray-700 mb-6">📚 Histórico de Criações</h2>
            <div id="historyList" class="space-y-4">
                <p class="text-gray-500 text-center py-8">Nenhuma criação ainda. Comece digitando um roteiro!</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center mt-12 text-white opacity-80">
            <p>© 2024 Criador de Roteiros Visuais - Transforme ideias em realidade</p>
        </footer>
    </div>

    <script>
        // State management
        let generatedImages = [];
        let isNarrating = false;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;

        // DOM Elements
        const scriptInput = document.getElementById('scriptInput');
        const generateBtn = document.getElementById('generateBtn');
        const narrateBtn = document.getElementById('narrateBtn');
        const stopNarrateBtn = document.getElementById('stopNarrateBtn');
        const loading = document.getElementById('loading');
        const imagesGrid = document.getElementById('imagesGrid');
        const audioVisualization = document.getElementById('audioVisualization');
        const historyList = document.getElementById('historyList');

        // Generate images based on script
        async function generateImages() {
            const script = scriptInput.value.trim();
            
            if (!script) {
                alert('Por favor, digite um roteiro ou ideia primeiro!');
                return;
            }

            loading.classList.remove('hidden');
            imagesGrid.innerHTML = '';
            generatedImages = [];

            try {
                // Generate 3 different images based on the script
                const prompts = [
                    `Cena cinematográfica: ${script}`,
                    `Ilustração artística: ${script}`,
                    `Visual conceitual: ${script}`
                ];

                for (let i = 0; i < 3; i++) {
                    // Simulating image generation with placeholder
                    const imageUrl = `https://picsum.photos/seed/${script.substring(0, 20) + i}/800/600`;
                    
                    generatedImages.push({
                        url: imageUrl,
                        prompt: prompts[i],
                        timestamp: new Date().toLocaleString('pt-BR')
                    });

                    // Create image card
                    const imageCard = document.createElement('div');
                    imageCard.className = 'image-card bg-white rounded-2xl overflow-hidden shadow-lg';
                    imageCard.innerHTML = `
                        <img src="${imageUrl}" alt="Imagem gerada ${i + 1}" class="w-full h-64 object-cover">
                        <div class="p-4">
                            <p class="text-sm text-gray-600 mb-2">🎨 ${prompts[i]}</p>
                            <p class="text-xs text-gray-400">🕐 ${new Date().toLocaleString('pt-BR')}</p>
                        </div>
                    `;
                    imagesGrid.appendChild(imageCard);
                }

                // Save to history
                saveToHistory(script, generatedImages);

            } catch (error) {
                console.error('Erro ao gerar imagens:', error);
                alert('Erro ao gerar imagens. Tente novamente.');
            } finally {
                loading.classList.add('hidden');
            }
        }

        // Text-to-speech narration
        function startNarration() {
            const script = scriptInput.value.trim();
            
            if (!script) {
                alert('Por favor, digite um roteiro ou ideia primeiro!');
                return;
            }

            if (isNarrating) {
                stopNarration();
                return;
            }

            // Cancel any ongoing speech
            speechSynthesis.cancel();

            // Create utterance
            currentUtterance = new SpeechSynthesisUtterance(script);
            currentUtterance.lang = 'pt-BR';
            currentUtterance.rate = 0.9;
            currentUtterance.pitch = 1;

            // Event listeners
            currentUtterance.onstart = () => {
                isNarrating = true;
                audioVisualization.classList.remove('hidden');
                narrateBtn.innerHTML = '<span>⏸️</span><span>Pausar Narração</span>';
                narrateBtn.classList.remove('bg-green-500', 'hover:bg-green-600');
                narrateBtn.classList.add('bg-yellow-500', 'hover:bg-yellow-600');
            };

            currentUtterance.onend = () => {
                isNarrating = false;
                audioVisualization.classList.add('hidden');
                narrateBtn.innerHTML = '<span>🔊</span><span>Ouvir Narração</span>';
                narrateBtn.classList.remove('bg-yellow-500', 'hover:bg-yellow-600');
                narrateBtn.classList.add('bg-green-500', 'hover:bg-green-600');
            };

            currentUtterance.onerror = () => {
                isNarrating = false;
                audioVisualization.classList.add('hidden');
                narrateBtn.innerHTML = '<span>🔊</span><span>Ouvir Narração</span>';
                narrateBtn.classList.remove('bg-yellow-500', 'hover:bg-yellow-600');
                narrateBtn.classList.add('bg-green-500', 'hover:bg-green-600');
            };

            // Start speaking
            speechSynthesis.speak(currentUtterance);
        }

        // Stop narration
        function stopNarration() {
            speechSynthesis.cancel();
            isNarrating = false;
            audioVisualization.classList.add('hidden');
            narrateBtn.innerHTML = '<span>🔊</span><span>Ouvir Narração</span>';
            narrateBtn.classList.remove('bg-yellow-500', 'hover:bg-yellow-600');
            narrateBtn.classList.add('bg-green-500', 'hover:bg-green-600');
        }

        // Save to history
        function saveToHistory(script, images) {
            const historyItem = {
                script: script,
                images: images,
                timestamp: new Date().toLocaleString('pt-BR'),
                id: Date.now()
            };

            let history = JSON.parse(localStorage.getItem('scriptHistory') || '[]');
            history.unshift(historyItem);
            
            // Keep only last 10 items
            if (history.length > 10) {
                history = history.slice(0, 10);
            }
            
            localStorage.setItem('scriptHistory', JSON.stringify(history));
            loadHistory();
        }

        // Load history
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('scriptHistory') || '[]');
            
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-500 text-center py-8">Nenhuma criação ainda. Comece digitando um roteiro!</p>';
                return;
            }

            historyList.innerHTML = '';
            history.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.className = 'bg-gray-50 rounded-xl p-4 hover:bg-gray-100 transition-all cursor-pointer';
                historyItem.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-gray-700 font-medium flex-1">${item.script.substring(0, 100)}${item.script.length > 100 ? '...' : ''}</p>
                        <span class="text-xs text-gray-400 ml-4">${item.timestamp}</span>
                    </div>
                    <div class="flex gap-2">
                        ${item.images.slice(0, 3).map(img => `
                            <img src="${img.url}" alt="Miniatura" class="w-16 h-16 object-cover rounded-lg">
                        `).join('')}
                    </div>
                `;
                
                historyItem.addEventListener('click', () => {
                    scriptInput.value = item.script;
                    generatedImages = item.images;
                    imagesGrid.innerHTML = '';
                    item.images.forEach((img, index) => {
                        const imageCard = document.createElement('div');
                        imageCard.className = 'image-card bg-white rounded-2xl overflow-hidden shadow-lg';
                        imageCard.innerHTML = `
                            <img src="${img.url}" alt="Imagem gerada ${index + 1}" class="w-full h-64 object-cover">
                            <div class="p-4">
                                <p class="text-sm text-gray-600 mb-2">🎨 ${img.prompt}</p>
                                <p class="text-xs text-gray-400">🕐 ${img.timestamp}</p>
                            </div>
                        `;
                        imagesGrid.appendChild(imageCard);
                    });
                });
                
                historyList.appendChild(historyItem);
            });
        }

        // Event listeners
        generateBtn.addEventListener('click', generateImages);
        narrateBtn.addEventListener('click', startNarration);
        stopNarrateBtn.addEventListener('click', stopNarration);

        // Load history on page load
        loadHistory();

        // Keyboard shortcut
        scriptInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateImages();
            }
        });
    </script>
</body>
</html>
